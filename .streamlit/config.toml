# Configuration de l'interface Streamlit — thème élégant et chaleureux
[theme]
primaryColor = "#B49063"            # caramel (accents, sliders, focus)
backgroundColor = "#FBF8F2"         # crème, fond principal
secondaryBackgroundColor = "#F1E9DA" # sable, cartes / barre latérale
textColor = "#5C4A38"               # brun chaleureux, doux à lire
font = "sans serif"

[server]
headless = true
