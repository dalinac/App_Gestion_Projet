# Configuration de l'interface Streamlit — thème pastel et doux
[theme]
primaryColor = "#E58BBB"            # rose poudré (accents, sliders, focus)
backgroundColor = "#FFF6FB"         # fond principal très clair rosé
secondaryBackgroundColor = "#F3EAFB" # cartes / barre latérale (lavande pastel)
textColor = "#6B5876"               # mauve profond, doux à lire
font = "sans serif"

[server]
headless = true
